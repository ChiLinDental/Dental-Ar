<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>志蓮牙科 AR 刷牙</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:transparent; font-family:Arial,sans-serif; }
    a-scene { position:fixed !important; inset:0; }
    #ui { position:fixed; inset:0; z-index:10; pointer-events:none; }
    .topbar { position:absolute; top:48px; left:12px; right:12px; display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
    .pill, .tipbox { background:rgba(255,255,255,.90); color:#222; border-radius:999px; padding:6px 12px; font-size:13px; box-shadow:0 6px 18px rgba(0,0,0,.18); text-align:left; }
    .controls { display:flex; gap:8px; pointer-events:auto; margin-left:auto; }
    button { border:none; border-radius:999px; padding:12px 18px; font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,.2); }
    #startBtn { background:linear-gradient(135deg, #ff79b0, #ffb86c); color:white; }
    #musicBtn { display:none; background:rgba(255,255,255,.92); color:#222; }
    .bottom { position:absolute; left:50%; bottom:18px; transform:translateX(-50%); max-width:90vw; }
    .brand-panel { position:fixed; left:12px; bottom:12px; z-index:30; width:175px; height:230px; pointer-events:none; }
    .doctor-card { position:absolute; left:0; bottom:0; width:170px; height:220px; display:flex; align-items:flex-end; justify-content:center; overflow:visible; }
    .doctor-card img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 10px 18px rgba(0,0,0,.22)); }
    .brand-box { position:absolute; left:52px; bottom:18px; z-index:2; background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(249,251,255,.96)); border:2px solid rgba(176, 154, 122, .48); border-radius:14px; box-shadow:0 10px 20px rgba(0,0,0,.16); padding:7px 9px; display:flex; align-items:center; gap:7px; width:106px; }
    .brand-box::before { content:""; position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:26px; height:10px; border-radius:8px 8px 2px 2px; background:rgba(176, 154, 122, .9); box-shadow:inset 0 -2px 0 rgba(255,255,255,.45); }
    .brand-box img { width:28px; height:28px; object-fit:contain; flex-shrink:0; }
    .brand-text { font-size:10px; font-weight:700; color:#7b5b3d; line-height:1.15; white-space:normal; }
    audio { display:none; }
  </style>
</head>

    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sceneEl = document.querySelector('#scene');
      const startBtn = document.querySelector('#startBtn');
      const musicBtn = document.querySelector('#musicBtn');
      
      const bgm = document.querySelector('#bgm');
      const msg = document.querySelector('#msg');
      const timerText = document.querySelector('#timerText');
      const tipText = document.querySelector('#tipText');
      let arSystem = null;
      let started = false;
      let musicOn = true;
      let countdown = null;
      let seconds = 30;

      sceneEl.addEventListener('loaded', () => { arSystem = sceneEl.systems['mindar-face-system']; msg.textContent = '系統已載入，按開始測試相機畫面。'; });
      sceneEl.addEventListener('arReady', () => { msg.textContent = 'AR 已啟動，請把嘴部對準牙刷。'; });
      sceneEl.addEventListener('arError', () => { msg.textContent = 'AR 啟動失敗，請確認使用 localhost 或 HTTPS。'; started = false; startBtn.style.display = 'inline-block'; });
      sceneEl.addEventListener('targetFound', () => { msg.textContent = '見到你啦，開始刷牙。'; });
      sceneEl.addEventListener('targetLost', () => { msg.textContent = '暫時追唔到樣，請回到鏡頭中央。'; });

      function startCountdown() {
        clearInterval(countdown);
        seconds = 30;
        timerText.setAttribute('value', '刷牙倒數 30');
        tipText.setAttribute('value', '左右輕輕移動刷上排牙齒');
        countdown = setInterval(() => {
          seconds -= 1;
          if (seconds >= 0) timerText.setAttribute('value', '刷牙倒數 ' + seconds);
          if (seconds === 28) tipText.setAttribute('value', '準備刷牙'); if (seconds === 25) tipText.setAttribute('value', '刷牙開始'); if (seconds === 20) tipText.setAttribute('value', '慢慢刷上排牙齒'); if (seconds === 15) tipText.setAttribute('value', '刷完上排換下排'); if (seconds === 10) tipText.setAttribute('value', '慢慢刷下排牙齒'); if (seconds === 5) tipText.setAttribute('value', '最後衝刺！');
          if (seconds === 10) tipText.setAttribute('value', '慢慢刷下排牙齒');
          if (seconds <= 0) {
            clearInterval(countdown);
            timerText.setAttribute('value', '刷牙完成 ✓');
            tipText.setAttribute('value', '你今日刷得好叻！');
            msg.textContent = '完成啦！';
          }
        }, 1000);
      }

      async function playMusic() { try { bgm.muted = false; bgm.volume = 1; await bgm.play(); return true; } catch (e) { console.log(e); return false; } }
      async function unlockAudio() {
        try {
          bgm.muted = true;
          bgm.volume = 0;
          await bgm.play();
          bgm.pause();
          bgm.currentTime = 0;
          bgm.muted = false;
          bgm.volume = 1;
          return true;
        } catch (e) {
          console.log(e);
          bgm.muted = false;
          bgm.volume = 1;
          return false;
        }
      }

      startBtn.addEventListener('click', async () => {
        if (!arSystem) { msg.textContent = '系統未完成載入，請等一等再按。'; return; }
        if (started) return;
        started = true;
        startBtn.style.display = 'none';
        musicBtn.style.display = 'inline-block';
        msg.textContent = '正在啟動 AR，請允許相機。';
        try {
          await unlockAudio(); await playMusic();
          await arSystem.start();
          startCountdown();
          if (musicOn) {
            const ok = await playMusic();
            if (!ok) msg.textContent = 'AR 已啟動，如 iPhone 無聲，請再按一次音樂：開。';
          }
        } catch (err) {
          console.log(err);
          msg.textContent = '開不到相機，請檢查瀏覽器權限。';
          started = false;
          startBtn.style.display = 'inline-block';
        }
      });

      musicBtn.addEventListener('click', async () => {
        musicOn = !musicOn;
        if (musicOn) { musicBtn.textContent = '音樂：開'; await playMusic(); }
        else { musicBtn.textContent = '音樂：關'; bgm.pause(); }
      });

      
    });
  </script>
